name: stage254-real-qsp-anchor

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  qsp-session-anchor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install cryptography

      - name: Build Stage254 session anchor artifacts
        env:
          QSP_REAL_REPO: ../stage226
          QSP_REAL_RUN_CMD: python3 poc/run_poc.py
        run: |
          chmod +x tools/run_stage254_real_qsp_anchor.sh
          ./tools/run_stage254_real_qsp_anchor.sh

      - name: Install OpenTimestamps client
        run: |
          python -m pip install opentimestamps-client

      - name: Create OTS stamp
        run: |
          ots stamp out/session/session_manifest.json

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Create cosign bundle
        run: |
          cosign sign-blob --yes \
            --bundle out/anchors/session_manifest.json.cosign.bundle \
            out/session/session_manifest.json

      - name: Create GitHub anchor receipt
        run: |
          python - << 'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("out/session/session_manifest.json").read_text(encoding="utf-8"))
          receipt = {
              "schema": "github_session_anchor_receipt/v1",
              "repository": "${{ github.repository }}",
              "workflow": "stage254-real-qsp-anchor",
              "run_id": "${{ github.run_id }}",
              "run_attempt": "${{ github.run_attempt }}",
              "commit_sha": "${{ github.sha }}",
              "run_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
              "manifest_sha256": manifest["manifest_sha256"],
              "artifact_name": "stage254-real-qsp-anchor-artifacts",
          }

          out = Path("out/anchors/github_session_anchor_receipt.json")
          out.write_text(json.dumps(receipt, ensure_ascii=False, indent=2) + "\n", encoding="utf-8")
          print(f"[OK] wrote: {out}")
          PY

      - name: Upload session anchor artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stage254-real-qsp-anchor-artifacts
          path: |
            out/session/qsp_session_result.json
            out/session/session_manifest.json
            out/session/session_manifest.json.sha256
            out/witnesses/local_witness.json
            out/checkpoints/checkpoint_witness.json
            out/checkpoints/checkpoint_index.json
            out/checkpoints/history
            out/anchors/github_session_anchor_receipt.json
            out/session/session_manifest.json.ots
            out/anchors/session_manifest.json.cosign.bundle
            keys/local_witness_public.pem
            keys/checkpoint_witness_public.pem
